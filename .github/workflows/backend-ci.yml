name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build backend
        run: ./mvnw clean package

      - name: Build Docker image
        run: docker build -t marathon-backend .

      - name: Run Docker container
        run: |
          docker run -d -p 8080:8080 --name backend-test marathon-backend
          sleep 10

      - name: Test API endpoint
        run: curl http://localhost:8080/api/marathons